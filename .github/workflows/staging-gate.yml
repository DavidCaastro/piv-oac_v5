name: piv/staging-gate

# Gate 3 — Staging to Main (Human-Required)
# Trigger: PR from staging to main
# Agent: ComplianceAgent generates checklist → posts as PR comment → WAITS for human
# This workflow CANNOT merge. It prepares the checklist for human review.
# See: sys/git.md, contracts/compliance_agent.md

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - ready_for_review

concurrency:
  group: staging-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compliance-checklist:
    name: Gate 3 — ComplianceAgent Checklist
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SDK
        run: pip install -e .

      - name: Generate compliance checklist
        id: checklist
        env:
          ANTHROPIC_API_KEY: ${{ secrets.PIV_ANTHROPIC_KEY }}
          PIV_AUDIT_TOKEN: ${{ secrets.PIV_AUDIT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python -c "
          # ComplianceAgent generates checklist from TechSpecSheet + session engram
          # Stub: prints template checklist. Full evaluation requires PHASE 8 session state.
          checklist = '''
          - [ ] All functional requirements from specs/active/functional.md met
          - [ ] All acceptance criteria verified
          - [ ] No regressions detected (EvaluationAgent score ≥ 0.80)
          - [ ] Security review passed (Gate 2b APPROVED)
          - [ ] No hardcoded credentials (gitleaks clean)
          - [ ] Test coverage ≥ 80%
          - [ ] Documentation updated
          - [ ] CHANGELOG updated
          - [ ] AuditAgent session record complete
          '''
          print(checklist.strip())
          "
          echo "checklist_generated=true" >> "$GITHUB_OUTPUT"

      - name: Post compliance checklist as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## PIV/OAC Gate 3 — Compliance Checklist\n\n` +
              `> ⚠️ **This PR requires human approval.** Review the checklist below before merging.\n\n` +
              `ComplianceAgent has generated the following checklist based on the session spec and engram:\n\n` +
              `- [ ] All functional requirements from \`specs/active/functional.md\` met\n` +
              `- [ ] All acceptance criteria verified\n` +
              `- [ ] No regressions detected (EvaluationAgent score ≥ 0.80)\n` +
              `- [ ] Security review passed (Gate 2b APPROVED)\n` +
              `- [ ] No hardcoded credentials (gitleaks clean)\n` +
              `- [ ] Test coverage ≥ 80%\n` +
              `- [ ] Documentation updated\n` +
              `- [ ] CHANGELOG updated\n` +
              `- [ ] AuditAgent session record complete\n\n` +
              `**Merge is only permitted after a human reviewer approves this PR.**\n\n` +
              `_Generated by piv/staging-gate workflow. ComplianceAgent provides no legal guarantee._`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Set status — waiting for human
        # This step always passes, but the branch protection requires human approval.
        # The workflow itself cannot and does not merge.
        run: |
          echo "Gate 3 checklist generated. Waiting for human approval."
          echo "This workflow cannot merge — human must approve the PR."
